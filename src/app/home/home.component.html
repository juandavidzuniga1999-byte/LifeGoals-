<div class="container">
  <h2>Mis Metas de Vida</h2>

  
  <div class="form-group">
    <input
      type="text"
      [(ngModel)]="nuevaMeta"
      placeholder="Escribe tu nueva meta..."
    />
    <button (click)="agregar()">Agregar</button>
  </div>

  
  <ul>
    <li *ngFor="let meta of metas">
      <span>{{ meta.meta }}</span>
      <button (click)="eliminar(meta.id!)">Eliminar</button>
    </li>
  </ul>

  
  <p *ngIf="metas.length === 0">No tienes metas aún. ¡Agrega una!</p>
</div>
